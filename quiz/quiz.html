<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 강의 퀴즈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 24px 16px;
      background: #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .app-wrapper {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .quiz-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dbdbdb;
      padding: 24px;
      width: 100%;
    }
    .quiz-layout {
      display: flex;
      gap: 28px;
      align-items: flex-start;
      justify-content: center;
    }
    .quiz-main {
      flex: 1;
      min-width: 0;
      max-width: 640px;
    }
    .quiz-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #fff;
      border-radius: 8px;
      padding: 16px;
      border: 1px solid #dbdbdb;
      position: sticky;
      top: 24px;
    }
    .quiz-sidebar .sidebar-title {
      font-size: 0.8rem;
      color: #8e8e8e;
      margin-bottom: 10px;
      font-weight: 500;
    }
    .quiz-sidebar .current-info {
      font-size: 0.9rem;
      color: #262626;
      font-weight: 500;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid #dbdbdb;
    }
    .problem-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .problem-item {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: default;
      border: 1px solid #dbdbdb;
      background: #fff;
    }
    .problem-item.current {
      border-color: #262626;
      background: #262626;
      color: #fff;
    }
    .problem-item.correct {
      border-color: #2e7d32;
      background: #e8f5e9;
      color: #1b5e20;
    }
    .problem-item.wrong {
      border-color: #ef5350;
      background: #ffebee;
      color: #c62828;
    }
    .problem-item.correct:hover,
    .problem-item.wrong:hover {
      cursor: pointer;
      opacity: 0.9;
    }
    .problem-detail {
      margin-top: 12px;
      padding: 12px;
      background: #fafafa;
      border-radius: 6px;
      border: 1px solid #dbdbdb;
      font-size: 0.85rem;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }
    .problem-detail.visible {
      display: block;
    }
    .problem-detail .detail-num {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .problem-detail .detail-result {
      margin: 4px 0;
      padding: 4px 0;
    }
    .problem-detail .detail-result.correct { color: #2e7d32; }
    .problem-detail .detail-result.wrong { color: #c62828; }
    .page-header {
      text-align: center;
      margin-bottom: 24px;
      color: #262626;
    }
    .page-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 4px 0;
    }
    .page-header p {
      font-size: 0.9rem;
      color: #8e8e8e;
      margin: 0;
    }
    .screen {
      display: none;
      width: 100%;
      align-items: center;
      flex-direction: column;
    }
    .screen.active {
      display: flex;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dbdbdb;
      padding: 24px;
      width: 100%;
      max-width: 400px;
    }
    .unit-select-card {
      text-align: center;
    }
    .unit-select-card > p {
      color: #8e8e8e;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }
    .unit-btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      margin: 8px 0;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      background: #fff;
      color: #262626;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }
    .unit-btn:hover {
      background: #fafafa;
    }
    .unit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-bar {
      height: 4px;
      background: #dbdbdb;
      border-radius: 2px;
      margin: 16px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #262626;
      transition: width 0.3s;
      border-radius: 2px;
    }
    .stats {
      font-size: 0.85rem;
      color: #8e8e8e;
      margin-bottom: 16px;
    }
    .question-box {
      background: #fafafa;
      padding: 20px;
      border-radius: 8px;
      margin: 16px 0;
      border: 1px solid #dbdbdb;
      overflow: visible;
    }
    .question-box .q-text {
      line-height: 1.6;
    }
    .question-box pre {
      background: #fff;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid #dbdbdb;
      overflow-x: auto;
      overflow-y: visible;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      margin: 12px 0;
    }
    .question-box pre code {
      background: none;
      padding: 0;
    }
    .question-box code {
      background: #fafafa;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9rem;
      border: 1px solid #efefef;
    }
    .choice-opt {
      display: block;
      padding: 12px 16px;
      margin: 6px 0;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
      background: #fff;
    }
    .choice-opt:hover { border-color: #a8a8a8; }
    .choice-opt.selected { border-color: #262626; background: #fafafa; }
    .choice-opt.correct { border-color: #2e7d32; background: #e8f5e9; }
    .choice-opt.wrong { border-color: #c62828; background: #ffebee; }
    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 1rem;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      margin: 8px 0;
      background: #fafafa;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #a8a8a8;
      background: #fff;
    }
    #questionArea h3 {
      margin: 0 0 10px 0;
      font-size: 1rem;
      color: #262626;
      font-weight: 500;
    }
    .btn {
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #262626;
      color: #fff;
      border-color: #262626;
    }
    .btn-primary:hover { background: #363636; }
    .btn-secondary {
      background: #fff;
      color: #262626;
    }
    .btn-secondary:hover { background: #fafafa; }
    .feedback { padding: 12px; border-radius: 8px; margin: 16px 0; font-size: 0.9rem; }
    .feedback.correct { background: #f1f8e9; color: #33691e; border: 1px solid #dbdbdb; }
    .feedback.wrong { background: #ffebee; color: #b71c1c; border: 1px solid #ffcdd2; }
    .result-box {
      padding: 32px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dbdbdb;
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
    }
    .result-box h2 {
      margin: 0 0 16px 0;
      font-size: 1.25rem;
      color: #262626;
      font-weight: 600;
    }
    .result-box #resultMsg {
      font-size: 0.95rem;
      color: #8e8e8e;
      margin: 0 0 20px 0;
    }
    .result-score {
      font-size: 1.5rem;
      font-weight: 600;
      color: #262626;
      margin: 16px 0;
      line-height: 1.4;
    }
    .result-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      font-size: 0.85rem;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      overflow: hidden;
    }
    .result-table th, .result-table td {
      border: 1px solid #dbdbdb;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .result-table th { background: #fafafa; font-weight: 500; color: #262626; }
    .result-table tr.wrong { background: #fff8f8; }
    .result-table tr.correct { background: #f8fff8; }
    .result-table .num { width: 50px; text-align: center; }
    .load-err {
      color: #c62828;
      padding: 16px;
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 8px;
      margin: 16px 0;
      max-width: 400px;
      text-align: center;
      font-size: 0.9rem;
    }
    .quiz-actions { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .btn-hold {
      background: #fff;
      color: #262626;
      border-color: #dbdbdb;
      user-select: none;
      -webkit-user-select: none;
    }
    .btn-hold:hover { background: #fafafa; }
    .btn-hold:active { background: #f0f0f0; }
    .explanation-popup {
      margin-top: 12px;
      padding: 12px 16px;
      background: #fafafa;
      border-left: 3px solid #dbdbdb;
      border-radius: 4px;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .countdown-msg { font-size: 0.85rem; color: #8e8e8e; margin-top: 8px; }
    @media (max-width: 900px) {
      .quiz-layout { flex-direction: column; }
      .quiz-sidebar { width: 100%; position: static; max-width: 360px; margin: 0 auto; }
      .quiz-card { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <header class="page-header">
      <h1>📝 AI 강의 퀴즈</h1>
      <p>단원을 선택하고 퀴즈를 풀어보세요</p>
    </header>

    <div id="loadErr" class="load-err" style="display:none"></div>

    <!-- 1. 단원 선택 화면 -->
    <div id="unitSelect" class="screen active">
      <div class="card unit-select-card">
        <p>풀고자 하는 단원을 선택하세요.</p>
        <button class="unit-btn" data-unit="day1_Python_for_AI">Day 1: AI를 위한 Python</button>
        <button class="unit-btn" data-unit="day2_AI_Math">Day 2: AI를 위한 Math (선형·로지스틱 회귀)</button>
        <button class="unit-btn" data-unit="day3_AI_Data_EDA">Day 3: EDA와 Scikit-learn</button>
        <button class="unit-btn" data-unit="day4_MLP">Day 4: 신경망과 MLP</button>
        <button class="unit-btn" data-unit="day5_CNN">Day 5: CNN과 Fine-tuning</button>
        <button class="unit-btn" data-unit="day6_llm">Day 6: 파운데이션·멀티모달</button>
        <button class="unit-btn" data-unit="day7_embeddings">Day 7: 토큰화와 임베딩</button>
        <button class="unit-btn" data-unit="day8_data_synthetic">Day 8: 합성 데이터</button>
      </div>
    </div>

    <!-- 2. 퀴즈 진행 화면 -->
    <div id="quizScreen" class="screen">
      <div class="container">
        <div class="quiz-card">
        <div class="quiz-layout">
          <div class="quiz-main">
            <div class="progress-bar">
              <div id="progressFill" class="progress-fill" style="width: 0%"></div>
            </div>
            <div id="stats" class="stats"></div>
            <div id="setInfo" class="stats" style="color:#262626;font-weight:500;"></div>
            <div id="questionArea"></div>
            <div id="quizActions" class="quiz-actions">
              <button id="submitBtn" class="btn btn-primary" style="display:none">제출</button>
              <button id="hintBtn" class="btn btn-hold" style="display:none">정답 확인하기 (꾹 누르기)</button>
              <button id="backToUnitBtn" class="btn btn-secondary">단원으로 돌아가기</button>
            </div>
            <div id="explanationPopup" class="explanation-popup" style="display:none"></div>
          </div>
          <div id="quizSidebar" class="quiz-sidebar">
            <div class="sidebar-title">문제 진행</div>
            <div id="sidebarCurrent" class="current-info"></div>
            <div id="problemList" class="problem-list"></div>
            <div style="font-size:0.75rem;color:#8e8e8e;margin-top:8px">푼 문제 클릭 시 상세 보기</div>
            <div id="problemDetail" class="problem-detail"></div>
          </div>
        </div>
        </div>
      </div>
    </div>

    <!-- 3. 결과 화면 -->
    <div id="resultScreen" class="screen">
      <div class="result-box">
        <h2>퀴즈 완료!</h2>
        <div id="resultScore" class="result-score"></div>
        <p id="resultMsg"></p>
        <div id="resultTableWrap"></div>
        <button id="backBtn" class="btn btn-secondary" style="margin-top:24px">단원 선택으로 돌아가기</button>
      </div>
    </div>
  </div>

  <script>
    let QUIZ_DATA = null;

    async function loadQuizData() {
      try {
        const res = await fetch('quiz_data.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        QUIZ_DATA = await res.json();
        return true;
      } catch (e) {
        document.getElementById('loadErr').style.display = 'block';
        document.getElementById('loadErr').innerHTML = '퀴즈 데이터를 불러올 수 없습니다.<br>quiz 폴더에서 <code>python -m http.server 8080</code> 실행 후 <a href="http://localhost:8080/quiz.html">http://localhost:8080/quiz.html</a> 로 접속하세요.';
        document.querySelectorAll('.unit-btn').forEach(b => b.disabled = true);
        return false;
      }
    }

    function normalize(s) {
      return String(s).trim().replace(/\s/g, '').toLowerCase();
    }
    function checkShortAnswer(user, answers) {
      if (!user || !answers || !answers.length) return false;
      const u = normalize(user);
      for (const a of answers) {
        const ac = normalize(String(a));
        if (!ac) continue;
        if (ac.includes(u) || u.includes(ac)) return true;
      }
      return false;
    }
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    function formatQuestion(q) {
      return q
        .replace(/```([\s\S]*?)```/g, (_, c) => '<pre><code>' + escapeHtml(c) + '</code></pre>')
        .replace(/`([^`]+)`/g, (_, c) => '<code>' + escapeHtml(c) + '</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    }
    function formatAnswer(ans) {
      return Array.isArray(ans) ? ans.join(', ') : ans;
    }

    let state = { unit: null, index: 0, correct: 0, answerResults: [] };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startQuiz(unit) {
      if (!QUIZ_DATA) return;
      const sets = QUIZ_DATA[unit];
      const setIndex = Math.floor(Math.random() * sets.length);
      const questions = sets[setIndex];
      state = { unit, index: 0, correct: 0, answerResults: [], questions, setIndex: setIndex + 1 };
      showScreen('quizScreen');
      renderQuestion();
      renderSidebar();
    }

    function renderSidebar() {
      const questions = state.questions;
      const total = questions.length;
      const idx = state.index;
      const listEl = document.getElementById('problemList');
      const currentEl = document.getElementById('sidebarCurrent');
      const detailEl = document.getElementById('problemDetail');

      currentEl.textContent = `현재: ${idx + 1}번 문제 / 총 ${total}문제`;

      listEl.innerHTML = '';
      for (let i = 0; i < total; i++) {
        const item = document.createElement('div');
        item.className = 'problem-item';
        item.textContent = i + 1;
        if (i < state.answerResults.length) {
          item.classList.add(state.answerResults[i].correct ? 'correct' : 'wrong');
        } else if (i === idx) {
          item.classList.add('current');
        }
        const q = questions[i];
        const r = state.answerResults[i];
        item.onclick = () => {
          if (r) {
            const ansStr = formatAnswer(q.answer);
            detailEl.innerHTML = '<div class="detail-num">문제 ' + (i + 1) + '</div>' +
              '<div class="detail-result ' + (r.correct ? 'correct' : 'wrong') + '">' +
              (r.correct ? '✓ 정답' : '✗ 오답') + '</div>' +
              '<div>제출: ' + escapeHtml(r.userAnswer) + '</div>' +
              '<div>정답: ' + escapeHtml(ansStr) + '</div>' +
              (q.explanation ? '<div style="margin-top:8px;color:#666">' + escapeHtml(q.explanation) + '</div>' : '');
            detailEl.classList.add('visible');
          } else {
            detailEl.classList.remove('visible');
          }
        };
        listEl.appendChild(item);
      }
      detailEl.classList.remove('visible');
    }

    function renderQuestion() {
      const questions = state.questions;
      const total = questions.length;
      const idx = state.index;

      document.getElementById('progressFill').style.width = (state.answerResults.length / total * 100) + '%';
      if (state.answerResults.length > 0) {
        const rate = (state.correct / state.answerResults.length * 100).toFixed(1);
        document.getElementById('stats').textContent = `진행: ${state.answerResults.length}/${total} | 맞힌 개수: ${state.correct} | 정답률: ${rate}%`;
      } else {
        document.getElementById('stats').textContent = `진행: 0/${total}`;
      }

      renderSidebar();

      if (idx >= total) {
        showResult();
        return;
      }

      const q = questions[idx];
      const area = document.getElementById('questionArea');
      area.innerHTML = '';

      document.getElementById('setInfo').textContent = `문제 세트 ${state.setIndex}`;
      const title = document.createElement('h3');
      title.textContent = `문제 ${idx + 1} / ${total}`;
      area.appendChild(title);

      const qDiv = document.createElement('div');
      qDiv.className = 'question-box';
      qDiv.innerHTML = '<div class="q-text">' + formatQuestion(escapeHtml(q.question)) + '</div>';
      area.appendChild(qDiv);

      const submitBtn = document.getElementById('submitBtn');
      submitBtn.style.display = 'block';
      submitBtn.onclick = null;
      setupHintButton(q);

      if (q.type === 'choice') {
        const opts = document.createElement('div');
        opts.className = 'choice-options';
        q.options.forEach((opt) => {
          const label = document.createElement('label');
          label.className = 'choice-opt';
          label.innerHTML = '<input type="radio" name="ans" value="' + escapeHtml(opt) + '"> ' + escapeHtml(opt);
          label.onclick = () => {
            opts.querySelectorAll('.choice-opt').forEach(l => l.classList.remove('selected'));
            label.classList.add('selected');
          };
          opts.appendChild(label);
        });
        area.appendChild(opts);
        submitBtn.onclick = () => {
          const sel = area.querySelector('input[name="ans"]:checked');
          if (!sel) { alert('답을 선택해주세요.'); return; }
          submitAnswer(sel.value, q);
        };
      } else {
        const inp = document.createElement('input');
        inp.type = 'text';
        inp.placeholder = '답을 입력하세요';
        inp.id = 'shortInput';
        area.appendChild(inp);
        submitBtn.onclick = () => {
          const val = inp.value.trim();
          if (!val) { alert('답을 입력해주세요.'); return; }
          const answers = Array.isArray(q.answer) ? q.answer : [q.answer];
          submitAnswer(val, q, answers);
        };
      }
    }

    function submitAnswer(userVal, q, shortAnswers) {
      let correct = false;
      if (q.type === 'choice') {
        correct = userVal.startsWith(q.answer);
      } else {
        correct = checkShortAnswer(userVal, shortAnswers || q.answer);
      }

      state.answerResults.push({ userAnswer: userVal, correct });
      if (correct) state.correct++;
      renderSidebar();

      const area = document.getElementById('questionArea');
      const fb = document.createElement('div');
      fb.className = 'feedback ' + (correct ? 'correct' : 'wrong');
      fb.textContent = correct ? '정답입니다!' : ('오답입니다. 정답: ' + formatAnswer(q.answer));
      area.appendChild(fb);

      const countdownDiv = document.createElement('div');
      countdownDiv.className = 'countdown-msg';
      area.appendChild(countdownDiv);

      document.getElementById('submitBtn').style.display = 'none';
      clearHintButton();

      const NEXT_WAIT = 2000;
      let remain = Math.ceil(NEXT_WAIT / 1000);
      countdownDiv.textContent = remain + '초 후 다음 문제로 이동';

      const iv = setInterval(() => {
        remain--;
        if (remain > 0) {
          countdownDiv.textContent = remain + '초 후 다음 문제로 이동';
        } else {
          clearInterval(iv);
          state.index++;
          renderQuestion();
        }
      }, 1000);
    }

    function showResult() {
      const questions = state.questions;
      const total = questions.length;
      const score = (state.correct / total * 100).toFixed(1);

      document.getElementById('resultScore').innerHTML = `문제 세트 ${state.setIndex}<br>${state.correct}/${total} (${score}%)`;
      document.getElementById('resultMsg').textContent = score >= 80 ? '잘하셨습니다!' : score >= 60 ? '괜찮습니다. 복습해보세요.' : '다시 한번 강의를 복습해보세요.';

      const wrap = document.getElementById('resultTableWrap');
      wrap.innerHTML = '';
      const table = document.createElement('table');
      table.className = 'result-table';
      table.innerHTML = '<thead><tr><th class="num">번호</th><th>제출한 정답</th><th>정답</th><th>해설</th></tr></thead><tbody></tbody>';
      const tbody = table.querySelector('tbody');
      questions.forEach((q, i) => {
        const r = state.answerResults[i];
        const tr = document.createElement('tr');
        tr.className = r.correct ? 'correct' : 'wrong';
        const ansStr = formatAnswer(q.answer);
        const expl = q.explanation || '-';
        tr.innerHTML = '<td class="num">' + (i + 1) + '</td><td>' + escapeHtml(r.userAnswer) + '</td><td>' + escapeHtml(ansStr) + '</td><td>' + escapeHtml(expl) + '</td>';
        tbody.appendChild(tr);
      });
      wrap.appendChild(table);
      showScreen('resultScreen');
    }

    document.querySelectorAll('.unit-btn').forEach(btn => {
      btn.onclick = () => startQuiz(btn.dataset.unit);
    });
    document.getElementById('backBtn').onclick = () => showScreen('unitSelect');

    document.getElementById('backToUnitBtn').onclick = () => {
      clearHintButton();
      state = { unit: null, index: 0, correct: 0, answerResults: [] };
      showScreen('unitSelect');
    };

    let holdTimer = null;
    const HOLD_DURATION = 500;

    function setupHintButton(q) {
      const hintBtn = document.getElementById('hintBtn');
      const popup = document.getElementById('explanationPopup');
      hintBtn.style.display = 'block';
      popup.style.display = 'none';
      popup.textContent = '';

      const showExplanation = () => {
        popup.textContent = q.explanation || '해설이 없습니다.';
        popup.style.display = 'block';
      };
      const hideExplanation = () => {
        popup.style.display = 'none';
        if (holdTimer) clearTimeout(holdTimer);
        holdTimer = null;
      };

      hintBtn.onmousedown = hintBtn.ontouchstart = (e) => {
        e.preventDefault();
        holdTimer = setTimeout(showExplanation, HOLD_DURATION);
      };
      hintBtn.onmouseup = hintBtn.onmouseleave = hintBtn.ontouchend = hintBtn.ontouchcancel = () => {
        hideExplanation();
      };
    }

    function clearHintButton() {
      const hintBtn = document.getElementById('hintBtn');
      const popup = document.getElementById('explanationPopup');
      hintBtn.style.display = 'none';
      hintBtn.onmousedown = hintBtn.ontouchstart = hintBtn.onmouseup = hintBtn.onmouseleave = hintBtn.ontouchend = hintBtn.ontouchcancel = null;
      popup.style.display = 'none';
      if (holdTimer) clearTimeout(holdTimer);
      holdTimer = null;
    }

    loadQuizData();
  </script>
</body>
</html>
